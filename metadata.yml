Identifier: eos5eya
Slug: antimicrobial-activity-ecoli
Status: Ready
Title: Antimicrobial activity prediction against Escherichia coli from public 
  ChEMBL and PubChem data
Description: Bioactivity prediction of growth inhibition in Escherichia coli, 
  trained as binary (active/inactive) classifiers from publicly available data 
  in ChEMBL and PubChem. Independent models are trained on multiple bioactivity 
  datasets, corresponding to single-point (percent inhibition) and dose-response
  (MIC) assays, among others. A ranking score is provided for each model 
  alongside a combined consensus score.
